##############################################
# DOCSIS CABLE MODEM METRICS (NUMERIC OIDs)
##############################################

[[inputs.snmp]]
  agents = ["172.20.3.217:161"]
  version = 2
  community = "public"
  timeout = "5s"
  name = "docsis_cm"
  max_repetitions = 25
  retries = 2
  interval = "30s"

  [inputs.snmp.tags]
    tech = "docsis"

###############################################################################
# 1) IF-MIB — WAN-liittymän liikenne (octets/packets)
# -----------------------------------------------------------------------------
# ifName                 1.3.6.1.2.1.31.1.1.1.1
# ifHCInOctets           1.3.6.1.2.1.31.1.1.1.6
# ifHCOutOctets          1.3.6.1.2.1.31.1.1.1.10
# ifHCInUcastPkts        1.3.6.1.2.1.31.1.1.1.7
# ifHCOutUcastPkts       1.3.6.1.2.1.31.1.1.1.11
###############################################################################

  [[inputs.snmp.table]]
    name = "ifXTable"

    [[inputs.snmp.table.field]]
      name = "ifName"
      oid  = "1.3.6.1.2.1.31.1.1.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid  = "1.3.6.1.2.1.31.1.1.1.6"

    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid  = "1.3.6.1.2.1.31.1.1.1.10"

    [[inputs.snmp.table.field]]
      name = "ifHCInUcastPkts"
      oid  = "1.3.6.1.2.1.31.1.1.1.7"

    [[inputs.snmp.table.field]]
      name = "ifHCOutUcastPkts"
      oid  = "1.3.6.1.2.1.31.1.1.1.11"

###############################################################################
# 2) DOCSIS 3.0 DOWNSTREAM RF & SNR/MER
# -----------------------------------------------------------------------------
# docsIfDownChannelId            1.3.6.1.2.1.10.127.1.1.1.1
# docsIfDownChannelFrequency     1.3.6.1.2.1.10.127.1.1.1.2
# docsIfDownChannelWidth         1.3.6.1.2.1.10.127.1.1.1.3
# docsIfDownChannelPower         1.3.6.1.2.1.10.127.1.1.1.6   (dBmV)
#
# SNR/MER:
# docsIfSigQSignalNoise          1.3.6.1.2.1.10.127.1.1.4.1.5 (dB)
###############################################################################

  [[inputs.snmp.table]]
    name = "docsIfDownChannel"

    [[inputs.snmp.table.field]]
      name = "down_id"
      oid  = "1.3.6.1.2.1.10.127.1.1.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "down_freq_hz"
      oid  = "1.3.6.1.2.1.10.127.1.1.1.2"

    [[inputs.snmp.table.field]]
      name = "down_width_hz"
      oid  = "1.3.6.1.2.1.10.127.1.1.1.3"

    [[inputs.snmp.table.field]]
      name = "down_power_dbmv"
      oid  = "1.3.6.1.2.1.10.127.1.1.1.6"

  [[inputs.snmp.table]]
    name = "docsIfSigQ"

    [[inputs.snmp.table.field]]
      name = "sigq_index"
      oid  = "1.3.6.1.2.1.10.127.1.1.4.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "snr_db"
      oid  = "1.3.6.1.2.1.10.127.1.1.4.1.5"

###############################################################################
# 3) DOCSIS 3.0 UPSTREAM RF (Tx-power, Freq, Width)
# -----------------------------------------------------------------------------
# docsIfUpChannelId              1.3.6.1.2.1.10.127.1.2.1.1
# docsIfUpChannelFrequency       1.3.6.1.2.1.10.127.1.2.1.2
# docsIfUpChannelWidth           1.3.6.1.2.1.10.127.1.2.1.3
#
# CM Tx-power total:
# docsIfCmStatusTxPower          1.3.6.1.2.1.10.127.1.2.2.1.3 (dBmV)
###############################################################################

  [[inputs.snmp.table]]
    name = "docsIfUpChannel"

    [[inputs.snmp.table.field]]
      name = "up_id"
      oid  = "1.3.6.1.2.1.10.127.1.2.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "up_freq_hz"
      oid  = "1.3.6.1.2.1.10.127.1.2.1.2"

    [[inputs.snmp.table.field]]
      name = "up_width_hz"
      oid  = "1.3.6.1.2.1.10.127.1.2.1.3"

  [[inputs.snmp.field]]
    name = "cm_txpower_dbmv"
    oid  = "1.3.6.1.2.1.10.127.1.2.2.1.3"

###############################################################################
# 4) DOCSIS 3.1 DOWNSTREAM — OFDM CHANNELS
# -----------------------------------------------------------------------------
# docsIf31CmDsOfdmChanTable                  1.3.6.1.2.1.10.166.3.1.1
# docsIf31CmDsOfdmChanId                     .1.3.6.1.2.1.10.166.3.1.1.1
# docsIf31CmDsOfdmChanFrequency              .1.3.6.1.2.1.10.166.3.1.1.2
# docsIf31CmDsOfdmChanPower                  .1.3.6.1.2.1.10.166.3.1.1.3 (dBmV)
# docsIf31CmDsOfdmChanRxMER                  .1.3.6.1.2.1.10.166.3.1.1.4 (dB * 10)
###############################################################################

  [[inputs.snmp.table]]
    name = "docsIf31DsOfdm"

    [[inputs.snmp.table.field]]
      name = "ds_ofdm_id"
      oid  = "1.3.6.1.2.1.10.166.3.1.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ds_ofdm_freq"
      oid  = "1.3.6.1.2.1.10.166.3.1.1.2"

    [[inputs.snmp.table.field]]
      name = "ds_ofdm_power_dbmv"
      oid  = "1.3.6.1.2.1.10.166.3.1.1.3"

    [[inputs.snmp.table.field]]
      name = "ds_ofdm_mer_x10"
      oid  = "1.3.6.1.2.1.10.166.3.1.1.4"

###############################################################################
# 5) DOCSIS 3.1 UPSTREAM — OFDMA CHANNELS
# -----------------------------------------------------------------------------
# docsIf31CmUsOfdmaChanTable                 1.3.6.1.2.1.10.166.3.2.1
# docsIf31CmUsOfdmaChanId                    .1
# docsIf31CmUsOfdmaChanFrequency             .2
# docsIf31CmUsOfdmaChanTxPower               .3  (dBmV * 10)
###############################################################################

  [[inputs.snmp.table]]
    name = "docsIf31UsOfdma"

    [[inputs.snmp.table.field]]
      name = "us_ofdma_id"
      oid  = "1.3.6.1.2.1.10.166.3.2.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "us_ofdma_freq"
      oid  = "1.3.6.1.2.1.10.166.3.2.1.2"

    [[inputs.snmp.table.field]]
      name = "us_ofdma_txpower_x10"
      oid  = "1.3.6.1.2.1.10.166.3.2.1.3"

###############################################################################
# 6) KONVERSIOT (MER_x10 → dB ja TxPower_x10 → dBmV)
###############################################################################

[[processors.starlark]]
  namepass = ["docsIf31DsOfdm"]
  source = '''
def apply(metric):
    if metric.has_field("ds_ofdm_mer_x10"):
        v = metric.field("ds_ofdm_mer_x10")
        metric.set_field("ds_ofdm_mer_db", float(v)/10.0)
    return metric
'''

[[processors.starlark]]
  namepass = ["docsIf31UsOfdma"]
  source = '''
def apply(metric):
    if metric.has_field("us_ofdma_txpower_x10"):
        v = metric.field("us_ofdma_txpower_x10")
        metric.set_field("us_ofdma_txpower_dbmv", float(v)/10.0)
    return metric
'''
