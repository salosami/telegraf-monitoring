##############################################
# DOCSIS CABLE MODEM METRICS (6 MODEMS)
# Power Levels & Counter Values
##############################################

[[inputs.snmp]]
  agents = [
    "172.20.0.230:161",
    "172.20.0.215:161",
    "172.20.0.209:161",
    "172.20.0.233:161",
    "172.20.0.232:161",
    "172.20.0.217:161"
  ]
  version = 2
  community = "public"
  timeout = "5s"
  name = "docsis_cm"
  max_repetitions = 25
  retries = 2
  interval = "15m"

  [inputs.snmp.tags]
    tech = "docsis"

###############################################################################
# 1) IF-MIB — WAN Interface Traffic Counters (octets/packets)
# Counter values for traffic analysis
# ifHCInOctets           1.3.6.1.2.1.31.1.1.1.6    (downstream data)
# ifHCOutOctets          1.3.6.1.2.1.31.1.1.1.10   (upstream data)
# ifHCInUcastPkts        1.3.6.1.2.1.31.1.1.1.7    (downstream packets)
# ifHCOutUcastPkts       1.3.6.1.2.1.31.1.1.1.11   (upstream packets)
###############################################################################

  [[inputs.snmp.table]]
    name = "ifXTable"

    [[inputs.snmp.table.field]]
      name = "ifName"
      oid  = "1.3.6.1.2.1.31.1.1.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid  = "1.3.6.1.2.1.31.1.1.1.6"

    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid  = "1.3.6.1.2.1.31.1.1.1.10"

    [[inputs.snmp.table.field]]
      name = "ifHCInUcastPkts"
      oid  = "1.3.6.1.2.1.31.1.1.1.7"

    [[inputs.snmp.table.field]]
      name = "ifHCOutUcastPkts"
      oid  = "1.3.6.1.2.1.31.1.1.1.11"

###############################################################################
# 2) DOCSIS 3.0 DOWNSTREAM — Power Levels & Quality
# Power levels for channel measurement
# docsIfDownChannelId            1.3.6.1.2.1.10.127.1.1.1.1
# docsIfDownChannelFrequency     1.3.6.1.2.1.10.127.1.1.1.2
# docsIfDownChannelWidth         1.3.6.1.2.1.10.127.1.1.1.3
# docsIfDownChannelPower         1.3.6.1.2.1.10.127.1.1.1.6   (dBmV)
# docsIfSigQSignalNoise          1.3.6.1.2.1.10.127.1.1.4.1.5 (dB)
###############################################################################

  [[inputs.snmp.table]]
    name = "docsIfDownChannel"

    [[inputs.snmp.table.field]]
      name = "down_id"
      oid  = "1.3.6.1.2.1.10.127.1.1.1.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "down_freq_hz"
      oid  = "1.3.6.1.2.1.10.127.1.1.1.1.2"

    [[inputs.snmp.table.field]]
      name = "down_width_hz"
      oid  = "1.3.6.1.2.1.10.127.1.1.1.1.3"

    [[inputs.snmp.table.field]]
      name = "down_power_dbmv"
      oid  = "1.3.6.1.2.1.10.127.1.1.1.1.6"

  [[inputs.snmp.table]]
    name = "docsIfSigQ"

    [[inputs.snmp.table.field]]
      name = "sigq_index"
      oid  = "1.3.6.1.2.1.10.127.1.1.4.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "snr_db"
      oid  = "1.3.6.1.2.1.10.127.1.1.4.1.5"

###############################################################################
# 3) DOCSIS 3.0 UPSTREAM — Power Levels
# Upstream power measurements
# docsIfUpChannelId              1.3.6.1.2.1.10.127.1.2.1.1
# docsIfUpChannelFrequency       1.3.6.1.2.1.10.127.1.2.1.2
# docsIfUpChannelWidth           1.3.6.1.2.1.10.127.1.2.1.3
# docsIfCmStatusTxPower          1.3.6.1.2.1.10.127.1.2.2.1.3 (dBmV)
###############################################################################

  [[inputs.snmp.table]]
    name = "docsIfUpChannel"

    [[inputs.snmp.table.field]]
      name = "up_id"
      oid  = "1.3.6.1.2.1.10.127.1.2.1.1.1"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "up_freq_hz"
      oid  = "1.3.6.1.2.1.10.127.1.2.1.1.2"

    [[inputs.snmp.table.field]]
      name = "up_width_hz"
      oid  = "1.3.6.1.2.1.10.127.1.2.1.1.3"

  [[inputs.snmp.field]]
    name = "cm_txpower_dbmv"
    oid  = "1.3.6.1.2.1.10.127.1.2.2.1.3"

###############################################################################
# 4) DOCSIS 3.1 DOWNSTREAM — OFDM MER & Counters
# DOCS-IF31-MIB (CableLabs enterprise OID 1.3.6.1.4.1.4491.2.1.20)
# docsIf31CmDsOfdmChanTable                  1.3.6.1.4.1.4491.2.1.20.1.2
# docsIf31CmDsOfdmChanRxMer                  .1.2.1.1  (MER * 10)
# docsIf31CmDsOfdmChanCorrectedWords         .1.2.1.8  (Counter)
# docsIf31CmDsOfdmChanUncorrectableWords     .1.2.1.9  (Counter)
###############################################################################

  [[inputs.snmp.table]]
    name = "docsIf31DsOfdm"

    [[inputs.snmp.table.field]]
      name = "ds_ofdm_mer_x10"
      oid  = "1.3.6.1.4.1.4491.2.1.20.1.2.1.1"

    [[inputs.snmp.table.field]]
      name = "ds_ofdm_corrected"
      oid  = "1.3.6.1.4.1.4491.2.1.20.1.2.1.8"

    [[inputs.snmp.table.field]]
      name = "ds_ofdm_uncorrectable"
      oid  = "1.3.6.1.4.1.4491.2.1.20.1.2.1.9"

###############################################################################
# 5) DOCSIS 3.1 UPSTREAM — OFDMA Channel
# DOCS-IF31-MIB (CableLabs enterprise OID 1.3.6.1.4.1.4491.2.1.20)
# docsIf31CmUsOfdmaChanTable                 1.3.6.1.4.1.4491.2.1.20.1.1
# docsIf31CmUsOfdmaChanId                    .1.1.1.1
###############################################################################

  [[inputs.snmp.table]]
    name = "docsIf31UsOfdma"

    [[inputs.snmp.table.field]]
      name = "us_ofdma_id"
      oid  = "1.3.6.1.4.1.4491.2.1.20.1.1.1.1"
      is_tag = true
